name: Build GX Radar APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: List files
      run: ls -la

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.5

    - name: Find project location
      run: |
        echo "Looking for build.gradle..."
        find . -name "build.gradle" -type f
        echo "Looking for settings.gradle..."
        find . -name "settings.gradle" -type f

    - name: Build Debug APK
      run: |
        PROJECT_DIR=$(dirname $(find . -name "settings.gradle" -type f | head -1))
        echo "Project directory: $PROJECT_DIR"
        cd "$PROJECT_DIR"
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew
        ./gradlew assembleDebug --no-configuration-cache

    - name: Build Release APK
      run: |
        PROJECT_DIR=$(dirname $(find . -name "settings.gradle" -type f
