name: Build GX Radar APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle 8.5
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.5
        cache-read-only: false

    - name: Copy id_map.json to assets
      run: |
        mkdir -p app/src/main/assets
        cp id_map.json app/src/main/assets/

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-configuration-cache

    - name: Build Release APK
      run: ./gradlew assembleRelease --no-configuration-cache

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: gx-radar-debug
        path: app/build/outputs/apk/debug/*.apk

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: gx-radar-release
        path: app/build/outputs/apk/release/*.apk
